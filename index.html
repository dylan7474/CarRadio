<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoHub - Car Dashboard</title>
    <!-- Tailwind for quick, beautiful UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HLS Support for the new BBC Link -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            touch-action: none; 
        }

        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Views */
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        #map-view {
            z-index: 10;
        }

        #radio-view {
            z-index: 30;
            background: #000;
            transform: translateY(100%); 
            box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
        }

        #radio-view.active {
            transform: translateY(0);
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        /* Carousel Logic */
        #station-carousel {
            display: flex;
            width: 300%; /* 3 stations */
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .station-page {
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .station-art {
            width: 200px;
            height: 200px;
            border-radius: 3rem;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
            position: relative;
        }

        /* Swipe Handles */
        .pull-tab {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 25;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            cursor: pointer;
        }

        .swipe-handle {
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 3px;
        }

        .top-handle-area {
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 40;
        }

        /* Pulse for Playing State */
        .playing-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 3rem;
            border: 4px solid #3b82f6;
            animation: ring-pulse 2s infinite;
        }

        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .dot-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        .dot-indicator.active {
            background: #3b82f6;
            width: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- MAP VIEW -->
        <div id="map-view" class="view">
            <iframe 
                id="map-iframe"
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15000!2d-0.1276!3d51.5072!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2suk!4v1620000000000!5m2!1sen!2suk" 
                class="w-full h-full border-none"
                allowfullscreen="" 
                loading="lazy">
            </iframe>

            <div class="absolute top-6 left-6 z-40">
                <div class="glass-panel px-5 py-3 flex items-center space-x-3">
                    <i data-lucide="navigation" class="text-blue-500 w-6 h-6"></i>
                    <span class="font-bold text-lg tracking-tight">AUTOHUB</span>
                </div>
            </div>

            <div class="absolute bottom-28 right-6 z-40">
                <button onclick="launchNativeMaps()" class="glass-panel w-16 h-16 flex items-center justify-center text-white active:scale-90">
                    <i data-lucide="external-link" class="w-8 h-8"></i>
                </button>
            </div>

            <div class="pull-tab" onclick="showRadio()">
                <div class="flex flex-col items-center space-y-2">
                    <div class="swipe-handle"></div>
                    <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/40">Swipe Up for Radio</span>
                </div>
            </div>
        </div>

        <!-- RADIO DECK -->
        <div id="radio-view" class="view flex flex-col">
            <div class="top-handle-area" onclick="hideRadio()">
                <div class="flex flex-col items-center space-y-2">
                    <div class="swipe-handle bg-white/20"></div>
                    <span class="text-[9px] font-bold uppercase tracking-[0.2em] text-white/30">Swipe Up for Map</span>
                </div>
            </div>

            <div class="flex-grow overflow-hidden relative">
                <div id="station-carousel">
                    <!-- Station 1 -->
                    <div class="station-page">
                        <div class="station-art" id="art-0">
                            <i data-lucide="palmtree" class="w-20 h-20 text-white"></i>
                        </div>
                        <h2 class="text-4xl font-black mb-2 tracking-tighter uppercase">Radio Paradise</h2>
                        <p class="text-blue-400 font-bold tracking-widest text-sm mb-2">MAIN MIX</p>
                        <p id="error-0" class="text-red-500 text-xs font-bold hidden">SOURCE ERROR</p>
                    </div>

                    <!-- Station 2 -->
                    <div class="station-page">
                        <div class="station-art bg-gradient-to-br from-red-500 to-black" id="art-1">
                            <i data-lucide="flame" class="w-20 h-20 text-white"></i>
                        </div>
                        <h2 class="text-4xl font-black mb-2 tracking-tighter uppercase">Rock Mix</h2>
                        <p class="text-red-500 font-bold tracking-widest text-sm mb-2">RADIO PARADISE</p>
                        <p id="error-1" class="text-red-500 text-xs font-bold hidden">SOURCE ERROR</p>
                    </div>

                    <!-- Station 3 -->
                    <div class="station-page">
                        <div class="station-art bg-gradient-to-br from-neutral-700 to-neutral-900" id="art-2">
                            <div class="text-6xl font-black text-white">4</div>
                        </div>
                        <h2 class="text-4xl font-black mb-2 tracking-tighter uppercase">BBC Radio 4</h2>
                        <p class="text-neutral-400 font-bold tracking-widest text-sm mb-2">LIVE NEWS & CULTURE</p>
                        <p id="error-2" class="text-red-500 text-xs font-bold hidden">SOURCE ERROR</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-center space-x-3 mb-8">
                <div class="dot-indicator active" id="dot-0"></div>
                <div class="dot-indicator" id="dot-1"></div>
                <div class="dot-indicator" id="dot-2"></div>
            </div>

            <div class="p-10 pb-16 bg-white/5 border-t border-white/5 flex items-center justify-around">
                <button onclick="prevStation()" class="w-20 h-20 flex items-center justify-center active:bg-white/10 rounded-full">
                    <i data-lucide="chevron-left" class="w-12 h-12"></i>
                </button>
                <button id="master-play-btn" onclick="togglePlay()" class="w-24 h-24 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform">
                    <i data-lucide="play" class="w-12 h-12 ml-1" id="play-icon"></i>
                </button>
                <button onclick="nextStation()" class="w-20 h-20 flex items-center justify-center active:bg-white/10 rounded-full">
                    <i data-lucide="chevron-right" class="w-12 h-12"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="radio-player"></audio>

    <script>
        lucide.createIcons();

        const radioView = document.getElementById('radio-view');
        const carousel = document.getElementById('station-carousel');
        const player = document.getElementById('radio-player');
        const playIcon = document.getElementById('play-icon');

        const stations = [
            { name: "Radio Paradise", url: "https://stream.radioparadise.com/mp3-128", type: 'mp3' },
            { name: "RP Rock Mix", url: "https://stream.radioparadise.com/rock-128", type: 'mp3' },
            { name: "BBC Radio 4", url: "https://as-hls-ww-live.akamaized.net/pool_55057080/live/ww/bbc_radio_fourfm/bbc_radio_fourfm.isml/bbc_radio_fourfm-audio%3d96000.norewind.m3u8", type: 'hls' }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let isRadioVisible = false;
        let hlsInstance = null;

        // --- GESTURE ENGINE ---
        let startX = 0;
        let startY = 0;

        document.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            const diffX = startX - e.changedTouches[0].clientX;
            const diffY = startY - e.changedTouches[0].clientY;

            if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 50) {
                if (diffY > 0) {
                    if (!isRadioVisible) showRadio();
                    else hideRadio();
                } else if (isRadioVisible) {
                    hideRadio();
                }
            } else if (isRadioVisible && Math.abs(diffX) > 50) {
                if (diffX > 0) nextStation();
                else prevStation();
            }
        });

        function showRadio() {
            radioView.classList.add('active');
            isRadioVisible = true;
            if (!player.src && !hlsInstance) syncStation();
        }

        function hideRadio() {
            radioView.classList.remove('active');
            isRadioVisible = false;
        }

        function nextStation() {
            currentIndex = (currentIndex + 1) % stations.length;
            updateCarousel();
        }

        function prevStation() {
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            updateCarousel();
        }

        function updateCarousel() {
            carousel.style.transform = `translateX(-${currentIndex * 100}vw)`;
            document.querySelectorAll('.dot-indicator').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
            syncStation();
        }

        function syncStation() {
            const station = stations[currentIndex];
            document.querySelectorAll('[id^="error-"]').forEach(el => el.classList.add('hidden'));

            const wasPlaying = isPlaying;
            
            // 1. Thorough Clean up
            if (hlsInstance) {
                hlsInstance.stopLoad();
                hlsInstance.detachMedia();
                hlsInstance.destroy();
                hlsInstance = null;
            }

            player.pause();
            player.src = "";
            player.load();

            // 2. Load the new stream
            if (station.type === 'hls') {
                if (Hls.isSupported()) {
                    // Optimized config for live radio
                    hlsInstance = new Hls({
                        liveSyncDurationCount: 3,
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    
                    hlsInstance.loadSource(station.url);
                    hlsInstance.attachMedia(player);
                    
                    hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hlsInstance.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hlsInstance.recoverMediaError();
                                    break;
                                default:
                                    document.getElementById(`error-${currentIndex}`).classList.remove('hidden');
                                    break;
                            }
                        }
                    });
                } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                    player.src = station.url;
                } else {
                    document.getElementById(`error-${currentIndex}`).classList.remove('hidden');
                }
            } else {
                player.src = station.url;
            }
            
            if (wasPlaying) {
                setTimeout(() => attemptPlay(), 300);
            }
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: station.name,
                    artist: 'AutoHub Radio',
                    artwork: [{ src: 'https://via.placeholder.com/512/3b82f6/FFFFFF?text=Radio', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        async function attemptPlay() {
            try {
                await player.play();
                isPlaying = true;
                updatePlayUI();
            } catch (err) {
                if (err.name !== "AbortError") {
                    console.error("Playback failed", err);
                    isPlaying = false;
                    updatePlayUI();
                    document.getElementById(`error-${currentIndex}`).classList.remove('hidden');
                }
            }
        }

        function togglePlay() {
            if (!player.src && !hlsInstance) syncStation();
            if (isPlaying) {
                player.pause();
                isPlaying = false;
                updatePlayUI();
            } else {
                attemptPlay();
            }
        }

        function updatePlayUI() {
            playIcon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
            document.querySelectorAll('.station-art').forEach((art, i) => {
                art.classList.toggle('playing-pulse', isPlaying && i === currentIndex);
            });
        }

        player.addEventListener('error', (e) => {
            console.error("Audio error", player.error);
            // Some browsers trigger error when source is cleared - ignore if intended pause
            if (player.src !== "" && !isRadioVisible) {
                isPlaying = false;
                updatePlayUI();
                document.getElementById(`error-${currentIndex}`).classList.remove('hidden');
            }
        });

        function launchNativeMaps() {
            window.location.href = "https://www.google.com/maps/dir/?api=1&destination=Current+Location";
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });
        requestWakeLock();
    </script>
</body>
</html>
