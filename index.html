<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoHub - Master Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: #000; color: white; touch-action: none; 
            font-family: -apple-system, system-ui, sans-serif;
        }
        
        #station-carousel { 
            display: flex; width: 700%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .station-page { 
            width: 100vw; height: 100%; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: center; padding: 1.5rem; 
        }

        .station-title {
            font-size: 14vw;
            line-height: 0.9;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            text-align: center;
            width: 100%;
        }

        .active-glow {
            filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.4));
            transition: filter 0.5s ease;
        }

        .master-control {
            position: absolute;
            top: 0; left: 0;
            z-index: 100;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .play-pause-icon {
            opacity: 0.1;
            transition: opacity 0.3s, transform 0.2s;
        }

        .status-bar {
            position: absolute;
            top: 2.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50;
            pointer-events: none;
            gap: 0.5rem;
        }

        /* Loading Spinner */
        .loader {
            width: 12px; height: 12px;
            border: 2px solid white;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.4s ease;
        }
        .dot-active {
            background: white;
            width: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="app-container" class="relative w-full h-full overflow-hidden">
        
        <!-- Status Overlay -->
        <div class="status-bar">
            <div class="bg-white/5 border border-white/10 px-4 py-1.5 rounded-full flex items-center gap-3 shadow-lg">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-neutral-600 transition-colors"></div>
                <span id="bt-status" class="text-[9px] font-black uppercase tracking-[0.2em] text-white/50">Ready</span>
                <div id="loading-spinner" class="hidden"><span class="loader"></span></div>
            </div>
            <!-- Live Logging Feedback -->
            <div id="debug-log" class="text-[7px] text-white/20 uppercase tracking-widest font-mono">System Standby</div>
        </div>

        <!-- Touch Interaction Layer -->
        <button class="master-control" onclick="togglePlay()">
            <div id="play-pause-container" class="play-pause-icon">
                <i data-lucide="play" id="main-icon" style="width: 140px; height: 140px;"></i>
            </div>
        </button>

        <!-- Dynamic Station Pages -->
        <div id="station-carousel">
            <div class="station-page">
                <div class="station-title text-blue-500" id="title-0">PARADISE</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">Main Mix</div>
            </div>
            <div class="station-page">
                <div class="station-title text-red-600" id="title-1">ROCK</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">Paradise Rock</div>
            </div>
            <div class="station-page">
                <div class="station-title text-neutral-400" id="title-2">RADIO 4</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">BBC Culture</div>
            </div>
            <div class="station-page">
                <div class="station-title text-blue-400" id="title-3">NPR</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">US News & Talk</div>
            </div>
            <div class="station-page">
                <div class="station-title text-indigo-400" id="title-4">WORLD</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">BBC World Service</div>
            </div>
            <div class="station-page">
                <div class="station-title text-amber-500" id="title-5">CLASSIC</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">Classical Focus</div>
            </div>
            <div class="station-page">
                <div class="station-title text-red-500" id="title-6">C-SPAN</div>
                <div class="text-white/30 font-bold tracking-[0.4em] mt-4 uppercase text-[10px]">Politics & Debate</div>
            </div>
        </div>

        <!-- Progress Tracker -->
        <div id="dot-container" class="absolute bottom-12 w-full flex justify-center gap-2.5 z-50"></div>
    </div>

    <audio id="radio-player" preload="none"></audio>

    <script>
        lucide.createIcons();

        const stations = [
            { name: "Radio Paradise", url: "https://stream.radioparadise.com/mp3-128", type: 'mp3' },
            { name: "RP Rock Mix", url: "https://stream.radioparadise.com/rock-128", type: 'mp3' },
            { name: "BBC Radio 4", url: "https://as-hls-ww-live.akamaized.net/pool_55057080/live/ww/bbc_radio_fourfm/bbc_radio_fourfm.isml/bbc_radio_fourfm-audio%3d96000.norewind.m3u8", type: 'hls' },
            { name: "NPR (WNYC)", url: "https://fm939.wnyc.org/wnycfm", type: 'mp3' }, 
            { name: "BBC World", url: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service", type: 'mp3' },
            { name: "YourClassical", url: "https://cms.stream.publicradio.org/cms.mp3", type: 'mp3' }, 
            { name: "C-SPAN Radio", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/CSPANRADIO.mp3", type: 'mp3' } 
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let hlsInstance = null;
        let mediaSessionHandlersBound = false;
        
        const player = document.getElementById('radio-player');
        const mainIcon = document.getElementById('main-icon');
        const carousel = document.getElementById('station-carousel');
        const btStatus = document.getElementById('bt-status');
        const statusDot = document.getElementById('status-dot');
        const dotContainer = document.getElementById('dot-container');
        const debugLog = document.getElementById('debug-log');
        const spinner = document.getElementById('loading-spinner');

        function log(msg) {
            debugLog.innerText = msg;
            console.log("[AutoHub] " + msg);
        }

        stations.forEach((_, i) => {
            const d = document.createElement('div');
            d.id = 'dot-' + i;
            d.className = 'dot';
            dotContainer.appendChild(d);
        });

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const s = stations[currentIndex];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: s.name,
                    artist: "AutoHub Live Radio",
                    album: "Preset Channel " + (currentIndex + 1)
                });
                
                bindMediaSessionHandlers();
                
                // Update playstate metadata so car display knows if it's playing
                navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
                
                btStatus.innerText = s.name;
                statusDot.className = "w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]";
            }
        }

        function bindMediaSessionHandlers() {
            if (!('mediaSession' in navigator) || mediaSessionHandlersBound) return;

            const handlers = {
                play: () => startPlayback(),
                pause: () => pausePlayback(),
                previoustrack: () => prevStation(),
                nexttrack: () => nextStation(),
                seekbackward: () => prevStation(),
                seekforward: () => nextStation(),
                stop: () => pausePlayback()
            };

            Object.entries(handlers).forEach(([action, handler]) => {
                try {
                    navigator.mediaSession.setActionHandler(action, handler);
                } catch (e) {
                    // Ignore unsupported actions per browser/vehicle implementation
                }
            });

            mediaSessionHandlersBound = true;
        }

        function syncStation() {
            const s = stations[currentIndex];
            log("Switching to " + s.name);
            spinner.classList.remove('hidden');
            
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            player.pause();
            player.src = "";
            player.load();

            if (s.type === 'hls') {
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
                    hlsInstance.loadSource(s.url);
                    hlsInstance.attachMedia(player);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        log("HLS Manifest OK");
                        if(isPlaying) player.play();
                    });
                } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                    player.src = s.url;
                }
            } else {
                player.src = s.url;
                player.load();
            }

            if (isPlaying) {
                player.play().catch(e => {
                    if (e.name !== 'AbortError') log("Auto-Play Blocked");
                });
            }
            updateMediaSession();
        }

        function startPlayback() {
            if (!player.src || player.src === window.location.href) {
                syncStation();
            }

            if (isPlaying) return;

            log("Play Requested...");
            spinner.classList.remove('hidden');
            player.play().then(() => {
                log("Stream Live");
                isPlaying = true;
                updateUI();
            }).catch(e => {
                if (e.name !== 'AbortError') {
                    log("Error: " + e.message.substring(0, 15));
                    isPlaying = false;
                    updateUI();
                }
            });
            updateUI();
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
            }
        }

        function pausePlayback() {
            if (!isPlaying) return;

            log("Pause Requested");
            player.pause();
            isPlaying = false;
            updateUI();
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "paused";
            }
        }

        function togglePlay() {
            if (isPlaying) pausePlayback();
            else startPlayback();
        }

        function nextStation() { currentIndex = (currentIndex + 1) % stations.length; updateCarousel(); }
        function prevStation() { currentIndex = (currentIndex - 1 + stations.length) % stations.length; updateCarousel(); }

        function updateCarousel() {
            carousel.style.transform = `translateX(-${currentIndex * 100}vw)`;
            stations.forEach((_, i) => {
                document.getElementById('dot-' + i).className = (i === currentIndex) ? 'dot dot-active' : 'dot';
            });
            syncStation();
            updateUI();
        }

        function updateUI() {
            mainIcon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
            document.getElementById('play-pause-container').style.opacity = isPlaying ? "0.05" : "0.3";
            document.querySelectorAll('.station-title').forEach((title, i) => {
                title.classList.toggle('active-glow', isPlaying && i === currentIndex);
            });
        }

        // --- Audio Event Logging ---
        player.addEventListener('waiting', () => { log("Buffering..."); spinner.classList.remove('hidden'); });
        player.addEventListener('playing', () => { 
            log("Playing"); 
            spinner.classList.add('hidden'); 
            isPlaying = true; 
            updateUI(); 
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
        });
        player.addEventListener('pause', () => { 
            log("Paused"); 
            spinner.classList.add('hidden'); 
            isPlaying = false; 
            updateUI(); 
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        });
        player.addEventListener('stalled', () => { log("Network Stalled"); });
        player.addEventListener('error', (e) => {
            log("Audio Error: " + player.error.code);
            spinner.classList.add('hidden');
        });

        // Swipe handling
        let startX = 0;
        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
        document.addEventListener('touchend', e => {
            const dx = startX - e.changedTouches[0].clientX;
            if (Math.abs(dx) > 70) { if (dx > 0) nextStation(); else prevStation(); }
        });

        // Bluetooth/keyboard fallback for systems that dispatch media keys as key events.
        document.addEventListener('keydown', (e) => {
            if (e.code === 'MediaTrackNext' || e.code === 'ArrowUp') {
                e.preventDefault();
                nextStation();
            } else if (e.code === 'MediaTrackPrevious' || e.code === 'ArrowDown') {
                e.preventDefault();
                prevStation();
            }
        });

        if ('wakeLock' in navigator) {
            let wl = null;
            const req = async () => { try { wl = await navigator.wakeLock.request('screen'); } catch(e){} };
            req(); 
            document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') req(); });
        }
        
        updateCarousel();
    </script>
</body>
</html>
