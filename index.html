<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoHub - Full Screen Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: #000; color: white; touch-action: none; 
            font-family: -apple-system, system-ui, sans-serif;
        }
        
        #station-carousel { 
            display: flex; width: 300%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .station-page { 
            width: 100vw; height: 100%; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: center; padding: 1rem; 
        }

        /* Full Screen Station Name */
        .station-title {
            font-size: 15vw;
            line-height: 1;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            text-align: center;
            width: 100%;
        }

        /* Subtle Glow for Active State */
        .active-glow {
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.3));
        }

        /* Center Play/Pause Button - Massive and Clean */
        .master-control {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .play-pause-icon {
            opacity: 0.15;
            transition: opacity 0.3s, transform 0.2s;
        }

        .master-control:active .play-pause-icon {
            transform: scale(0.9);
            opacity: 0.4;
        }

        /* Status Bar */
        .status-bar {
            position: absolute;
            top: 2rem;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="app-container" class="relative w-full h-full overflow-hidden">
        
        <!-- Top Status -->
        <div class="status-bar">
            <div class="bg-white/5 border border-white/10 px-4 py-1.5 rounded-full flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-neutral-600"></div>
                <span id="bt-status" class="text-[9px] font-black uppercase tracking-widest text-white/40">Ready</span>
            </div>
        </div>

        <!-- Master Interaction Layer (The whole screen is a button) -->
        <button class="master-control" onclick="togglePlay()">
            <div id="play-pause-container" class="play-pause-icon">
                <i data-lucide="play" id="main-icon" style="width: 120px; height: 120px;"></i>
            </div>
        </button>

        <!-- Main Station Content -->
        <div id="station-carousel">
            <!-- Radio Paradise Main -->
            <div class="station-page">
                <div class="station-title text-blue-500" id="title-0">PARADISE</div>
                <div class="text-white/20 font-bold tracking-[0.5em] mt-4 uppercase text-xs">Main Mix</div>
            </div>
            <!-- Radio Paradise Rock -->
            <div class="station-page">
                <div class="station-title text-red-600" id="title-1">ROCK</div>
                <div class="text-white/20 font-bold tracking-[0.5em] mt-4 uppercase text-xs">Radio Paradise</div>
            </div>
            <!-- BBC Radio 4 -->
            <div class="station-page">
                <div class="station-title text-neutral-400" id="title-2">RADIO 4</div>
                <div class="text-white/20 font-bold tracking-[0.5em] mt-4 uppercase text-xs">BBC Live</div>
            </div>
        </div>

        <!-- Bottom Page Indicator -->
        <div class="absolute bottom-10 w-full flex justify-center gap-3 z-50 pointer-events-none">
            <div id="dot-0" class="w-1.5 h-1.5 rounded-full bg-white/20 transition-all"></div>
            <div id="dot-1" class="w-1.5 h-1.5 rounded-full bg-white/20 transition-all"></div>
            <div id="dot-2" class="w-1.5 h-1.5 rounded-full bg-white/20 transition-all"></div>
        </div>
    </div>

    <!-- Hidden Audio element -->
    <audio id="radio-player" preload="auto"></audio>

    <script>
        lucide.createIcons();

        const stations = [
            { name: "Radio Paradise", url: "https://stream.radioparadise.com/mp3-128", type: 'mp3' },
            { name: "RP Rock Mix", url: "https://stream.radioparadise.com/rock-128", type: 'mp3' },
            { name: "BBC Radio 4", url: "https://as-hls-ww-live.akamaized.net/pool_55057080/live/ww/bbc_radio_fourfm/bbc_radio_fourfm.isml/bbc_radio_fourfm-audio%3d96000.norewind.m3u8", type: 'hls' }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let hlsInstance = null;
        
        const player = document.getElementById('radio-player');
        const mainIcon = document.getElementById('main-icon');
        const carousel = document.getElementById('station-carousel');
        const btStatus = document.getElementById('bt-status');
        const statusDot = document.getElementById('status-dot');

        // --- MEDIA SESSION (Sync with Car Bluetooth) ---
        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const station = stations[currentIndex];
                
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: station.name,
                    artist: "AutoHub Radio",
                    album: "Preset " + (currentIndex + 1)
                });

                // Attach Bluetooth Button Listeners
                navigator.mediaSession.setActionHandler('play', () => { if (!isPlaying) togglePlay(); });
                navigator.mediaSession.setActionHandler('pause', () => { if (isPlaying) togglePlay(); });
                navigator.mediaSession.setActionHandler('previoustrack', () => prevStation());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextStation());
                
                btStatus.innerText = station.name;
                statusDot.classList.remove('bg-neutral-600');
                statusDot.classList.add('bg-blue-500');
            }
        }

        // --- RADIO LOGIC ---
        function syncStation() {
            const station = stations[currentIndex];
            
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            
            player.pause();
            player.src = "";
            player.load();

            if (station.type === 'hls') {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(station.url);
                    hlsInstance.attachMedia(player);
                }
            } else {
                player.src = station.url;
            }

            // Only auto-play if the user had the radio on already
            if (isPlaying) {
                player.play().catch(e => console.warn("Stream interrupted:", e));
            }
            updateMediaSession();
        }

        function togglePlay() {
            if (!player.src && !hlsInstance) syncStation();
            
            if (isPlaying) {
                player.pause();
                isPlaying = false;
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
            } else {
                player.play().then(() => {
                    isPlaying = true;
                    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
                    updateUI();
                }).catch(e => {
                    console.error("Play failed", e);
                });
            }
            updateUI();
        }

        function nextStation() {
            currentIndex = (currentIndex + 1) % stations.length;
            updateCarousel();
        }

        function prevStation() {
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            updateCarousel();
        }

        function updateCarousel() {
            carousel.style.transform = `translateX(-${currentIndex * 100}vw)`;
            
            // Visual Dot Update
            [0, 1, 2].forEach(i => {
                const dot = document.getElementById('dot-' + i);
                dot.style.backgroundColor = (i === currentIndex) ? 'white' : 'rgba(255,255,255,0.2)';
                dot.style.width = (i === currentIndex) ? '24px' : '6px';
            });

            syncStation();
            updateUI();
        }

        function updateUI() {
            // Update the play/pause icon
            mainIcon.setAttribute('data-lucide', isPlaying ? 'pause' : 'play');
            lucide.createIcons();
            
            // Adjust opacity based on playing state
            const iconContainer = document.getElementById('play-pause-container');
            iconContainer.style.opacity = isPlaying ? "0.05" : "0.3";

            // Add glow to title if playing
            document.querySelectorAll('.station-title').forEach((title, i) => {
                title.classList.toggle('active-glow', isPlaying && i === currentIndex);
            });
        }

        // --- GESTURE DETECTION ---
        let startX = 0;
        document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
        document.addEventListener('touchend', e => {
            const dx = startX - e.changedTouches[0].clientX;
            // High threshold to avoid accidental skips during play/pause taps
            if (Math.abs(dx) > 80) {
                if (dx > 0) nextStation(); else prevStation();
            }
        });

        // Ensure browser handles audio focus correctly
        player.addEventListener('play', () => { isPlaying = true; updateUI(); });
        player.addEventListener('pause', () => { isPlaying = false; updateUI(); });

        // Keep Screen On
        if ('wakeLock' in navigator) {
            let wl = null;
            const requestWL = async () => { try { wl = await navigator.wakeLock.request('screen'); } catch(e){} };
            requestWL();
            document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') requestWL(); });
        }
    </script>
</body>
</html>
